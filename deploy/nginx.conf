# gosee Nginx 反向代理配置
# gosee 已 embed 前端（单二进制同时提供前端 + API），Nginx 只需反代到 8080。
#
# 启用：
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/gosee
#   sudo ln -s /etc/nginx/sites-available/gosee /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# HTTPS（推荐）：
#   sudo certbot --nginx -d monitor.example.com

server {
    listen 80;
    server_name monitor.example.com;   # 改成你的域名

    # 可选：强制跳转 HTTPS（启用 certbot 后取消注释）
    # return 301 https://$host$request_uri;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

